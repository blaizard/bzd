# Right now index.docker.io, which requires authentication does not work with this, see: https://github.com/bazelbuild/bazel/issues/21425
# Use the caching proxy for the rest
rewrite ^(?!.*(auth\.docker\.io|index\.docker\.io|datalocal\.blaizard\.com))(.*) http://127.0.0.1:8081/x/cache/@caching-proxy/https/$2
