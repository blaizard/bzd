name: Issue Event Handler with Opencode

on:
    issues:
        types: [opened, labeled]
    issue_comment:
        types: [created, edited]

jobs:
    lease_linux:
        if: github.actor != 'agent'
        runs-on: node_manager_client
        steps:
            - name: "Lease Linux"
              uses: https://git.blaizard.com/blaise/deployment/ci/gitea/lease_linux@main

    handle_issue:
        needs: lease_linux
        runs-on: opencode
        steps:
            - uses: actions/checkout@v3
              with:
                  submodules: "true"

            - name: "Build Tools"
              run: |
                  mkdir bin
                  ./tools/bazel build //deployment:lease --remote_download_toplevel
                  mv bazel-bin/deployment/lease bin/bzd-lease
                  export BAZEL_RUN_UNDER=./bin/bzd-lease

            - name: "Run opencode"
              env:
                  GITEA_REPOSITORY: ${{ github.repository }}
                  GITEA_ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  PROMPT="
                    You are working on the repository '${GITEA_REPOSITORY}' and handling issue #${GITEA_ISSUE_NUMBER}.

                    Use the Gitea MCP to:
                    1. Fetch the issue details (title, body, labels, comments).
                    2. Fetch ALL comments on this issue to understand the full conversation history,
                       previous clarifications, and any plans already discussed.
                    3. Check for any related issues or pull requests that might be relevant to this issue.

                    INSTRUCTIONS FOR ANALYSIS:
                    - Use the fetched data to identify the technical root cause.
                    - If the issue body or comments lack information to elaborate a precise plan, you MUST ask a QUESTION.
                    - Do NOT repeat the issue metadata (Title, Body, Comments) in your response. I already have that.

                    STRICT OUTPUT FORMAT:
                    Your response must contain ONLY the implementation steps or the clarification request. 
                    CRITICAL: If you do not follow the response requirement format, the CI will fail.

                    CHOOSE ONE:

                    PLAN:
                    1. [Step 1]
                    2. [Step 2]
                    ...

                    QUESTION:
                    [Your specific question here]
                  "
                  echo "PROMPT: $PROMPT"
                  ./bin/bzd-lease opencode run "$PROMPT" > /tmp/agent-response.txt
                  echo "RESPONSE:"
                  cat /tmp/agent-response.txt

            - name: "Check response type"
              run: |
                  if grep -q "^PLAN:" /tmp/agent-response.txt; then
                      echo "Response is a plan."
                      echo "type=plan" >> $GITHUB_OUTPUT
                  else
                      echo "Response is a question."
                      echo "type=question" >> $GITHUB_OUTPUT
                      sed -i 's/^[[:space:]]*QUESTION:[[:space:]]*//' /tmp/agent-response.txt
                  fi

            - name: "Post comment on issue"
              uses: ./.gitea/actions/comment
              with:
                  server_url: ${{ github.server_url }}
                  repository: ${{ github.repository }}
                  issue_number: ${{ github.event.issue.number }}
                  token: ${{ secrets.BZD_AGENT_TOKEN }}
                  body_file: /tmp/agent-response.txt
