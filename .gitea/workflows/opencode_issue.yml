name: Issue Event Handler with Opencode

on:
    issues:
        types: [opened, labeled]
    issue_comment:
        types: [created, edited]

jobs:
    lease_linux:
        if: github.actor != 'agent'
        runs-on: node_manager_client
        steps:
            - name: "Lease Linux"
              uses: https://git.blaizard.com/blaise/deployment/ci/gitea/lease_linux@main
              with:
                  name: "opencode_issue"
                  ttl: "300"

    handle_issue:
        needs: lease_linux
        runs-on: opencode
        steps:
            - uses: actions/checkout@v3
              with:
                  submodules: "true"

            - name: "Build Tools"
              run: |
                  mkdir bin
                  ./tools/bazel build //deployment:lease --remote_download_toplevel
                  mv bazel-bin/deployment/lease bin/bzd-lease
                  export BAZEL_RUN_UNDER=./bin/bzd-lease

            - name: "Run opencode"
              env:
                  GITEA_REPOSITORY: ${{ github.repository }}
                  GITEA_ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  PROMPT="
                    You are working on the repository '${GITEA_REPOSITORY}' and handling issue #${GITEA_ISSUE_NUMBER}.

                    Use the Gitea MCP and your available tools to deeply research the context: 
                    1. Fetch the issue details (title, body, labels, comments, etc).
                    2. Fetch ALL comments on this issue to understand the full conversation history, previous clarifications, and any plans already discussed.
                    3. Check for any related issues or pull requests that might be relevant.
                    4. DEEP RESEARCH: Actively search the codebase, read relevant file contents, and trace dependencies related to the issue to fully understand the current architecture.

                    INSTRUCTIONS FOR ANALYSIS:
                    - EXHAUST ALL POSSIBILITIES: Before proposing a plan or asking a question, you MUST formulate hypotheses and attempt to validate them using your tools. Trace the logic, inspect configurations, and dry-run potential solutions mentally or via tools if available.
                    - Do not ask a question if the answer can be found by reading the code or investigating independently. You must try everything you can to find the root cause yourself.
                    - Identify the precise technical root cause based on your deep research.
                    - If, and ONLY if, you have exhausted all avenues of independent investigation and critical information is still missing, you may ask a QUESTION.
                    - Do NOT repeat the issue metadata (Title, Body, Comments) in your response. I already have that.

                    STRICT OUTPUT FORMAT:
                    Your response must contain ONLY the implementation steps or the clarification request.  
                    CRITICAL: If you do not follow the response requirement format exactly, the CI will fail. 

                    CHOOSE ONE:

                    PLAN: 
                    (Your plan must be highly precise. Include exact file paths, target functions/classes, and specific logical changes required. No vague descriptions.)
                    1. [File: path/to/file.ext] - [Precise code change or addition to make]
                    2. [File: path/to/another.ext] - [Precise code change or addition to make]
                    ... 

                    QUESTION: 
                    (Ask only if exhaustive independent research failed. Briefly state what you investigated and exactly what information is blocking you.)
                    [Your specific question here]
                  "
                  echo "PROMPT: $PROMPT"
                  ./bin/bzd-lease opencode run "$PROMPT" > /tmp/agent-response.txt
                  echo "RESPONSE:"
                  cat /tmp/agent-response.txt

            - name: "Post comment on issue"
              uses: ./.gitea/actions/comment
              with:
                  server_url: ${{ github.server_url }}
                  repository: ${{ github.repository }}
                  issue_number: ${{ github.event.issue.number }}
                  token: ${{ secrets.BZD_AGENT_TOKEN }}
                  body_file: /tmp/agent-response.txt
