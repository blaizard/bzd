name: Opencode Event Router

on:
    issues:
        types: [opened, labeled]
    issue_comment:
        types: [created, edited]
    pull_request:
        types: [opened]
    pull_request_review:
        types: [submitted, edited]

jobs:
    router:
        runs-on: node_manager_client
        outputs:
            route: ${{ steps.set-route.outputs.route }}
        steps:
            - name: "Determine Route"
              id: set-route
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  ACTOR: ${{ github.actor }}
                  COMMENT_BODY: ${{ github.event.comment.body || '' }}
                  IS_PR: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && 'true' || 'false' }}
              run: |
                  set -euo pipefail

                  route="none"

                  if [[ "$EVENT_NAME" == "issue_comment" && "$ACTOR" != "agent" ]]; then
                      if [[ "$IS_PR" == "true" ]]; then
                          route="update_pr"
                      elif [[ "$COMMENT_BODY" == /pr* ]]; then
                          route="create_pr"
                      elif [[ "$COMMENT_BODY" == /* ]]; then
                          echo "Unsupported command: $COMMENT_BODY" >&2
                          exit 1
                      else
                          route="issue_comment"
                      fi    
                  elif [[ "$EVENT_NAME" == "pull_request" && "$ACTOR" == "agent" ]]; then
                      route="update_pr"
                  elif [[ "$EVENT_NAME" == "pull_request_review" && "$ACTOR" != "agent" ]]; then
                      route="update_pr"
                  else
                      echo "No routing needed for this event."
                  fi

                  echo "route=$route" >> $GITHUB_OUTPUT
                  echo "Determined route: $route"

    lease_linux:
        needs: router
        if: needs.router.outputs.route != 'none'
        runs-on: node_manager_client
        steps:
            - name: "Lease Linux"
              uses: https://git.blaizard.com/blaise/deployment/ci/gitea/lease_linux@main
              with:
                  name: "opencode_issue"
                  ttl: "300"

    route_issue_comment:
        needs: [router, lease_linux]
        runs-on: opencode
        if: needs.router.outputs.route == 'issue_comment'
        uses: ./.gitea/workflows/sub_opencode_issue_comment.yml
        secrets: inherit

    route_create_pr:
        needs: [router, lease_linux]
        runs-on: opencode
        if: needs.router.outputs.route == 'create_pr'
        uses: ./.gitea/workflows/sub_opencode_create_pr.yml
        secrets: inherit

    route_update_pr:
        concurrency:
            group: agent-pr-${{ github.event.pull_request.number }}
            cancel-in-progress: false
        needs: [router, lease_linux]
        runs-on: opencode
        if: needs.router.outputs.route == 'update_pr'
        uses: ./.gitea/workflows/sub_opencode_update_pr.yml
        secrets: inherit
