name: Opencode Event Router

on:
    # Issue created.
    issues:
        types: [opened]
    # Issue comment, PR comment (main thread), PR inline comment reply
    issue_comment:
        types: [created, edited]
    # PR created.
    pull_request:
        types: [opened]
    # PR review.
    pull_request_review:
        types: [submitted, edited]

jobs:
    router:
        runs-on: node_manager_client
        outputs:
            route: ${{ steps.set-metadata.outputs.route }}
            issue_number: ${{ steps.set-metadata.outputs.issue_number }}
        steps:
            - name: "Determine Route Information"
              id: set-metadata
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  ACTOR: ${{ github.actor }}
                  COMMENT_BODY: ${{ github.event.comment.body || '' }}
                  IS_PR: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && 'true' || 'false' }}
                  ISSUE_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
              run: |
                  set -euo pipefail

                  route="none"
                  issue_number="$ISSUE_NUMBER"

                  if [[ "$EVENT_NAME" == "issues" ]]; then
                      route="issue_comment"
                  elif [[ "$EVENT_NAME" == "issue_comment" && "$ACTOR" != "agent" ]]; then
                      if [[ "$IS_PR" == "true" ]]; then
                          route="update_pr"
                      elif [[ "$COMMENT_BODY" == /pr* ]]; then
                          route="create_pr"
                      elif [[ "$COMMENT_BODY" == /* ]]; then
                          echo "Unsupported command: $COMMENT_BODY" >&2
                          exit 1
                      else
                          route="issue_comment"
                      fi    
                  elif [[ "$EVENT_NAME" == "pull_request" && "$ACTOR" == "agent" ]]; then
                      route="initialize_pr"
                  elif [[ "$EVENT_NAME" == "pull_request_review" && "$ACTOR" != "agent" ]]; then
                      route="update_pr"
                  else
                      echo "No routing needed for this event."
                  fi

                  echo "route=$route" >> $GITHUB_OUTPUT
                  echo "issue_number=$issue_number" >> $GITHUB_OUTPUT
                  echo "Determined route: $route"
                  echo "Determined issue_number: $issue_number"

    lease_linux:
        needs: router
        if: needs.router.outputs.route != 'none'
        runs-on: node_manager_client
        steps:
            - name: "Lease Linux"
              uses: https://git.blaizard.com/blaise/deployment/ci/gitea/lease_linux@main
              with:
                  name: "opencode_issue"
                  ttl: "300"

    route_issue_comment:
        needs: [router, lease_linux]
        runs-on: opencode
        if: needs.router.outputs.route == 'issue_comment'
        uses: ./.gitea/workflows/sub_opencode_comment.yml
        secrets: inherit
        with:
            issue_number: ${{ needs.router.outputs.issue_number }}
            agent: "plan_orchestrator"
            prompt: |
                You are working on the repository '${{ github.repository }}' and handling issue #${{ needs.router.outputs.issue_number }}.

                Use the Gitea MCP and your available tools to deeply research the context: 
                1. Fetch the issue details (title, body, labels, comments, etc).
                2. Fetch ALL comments on this issue to understand the full conversation history, previous clarifications, and any plans already discussed.
                3. Check for any related issues or pull requests that might be relevant.
                4. DEEP RESEARCH: Actively search the codebase, read relevant file contents, and trace dependencies related to the issue to fully understand the current architecture.

                INSTRUCTIONS FOR ANALYSIS:
                - EXHAUST ALL POSSIBILITIES: Before proposing a plan or asking a question, you MUST formulate hypotheses and attempt to validate them using your tools. Trace the logic, inspect configurations, and dry-run potential solutions mentally or via tools if available.
                - Do not ask a question if the answer can be found by reading the code or investigating independently. You must try everything you can to find the root cause yourself.
                - Identify the precise technical root cause based on your deep research.
                - If, and ONLY if, you have exhausted all avenues of independent investigation and critical information is still missing, you may ask a QUESTION.
                - Do NOT repeat the issue metadata (Title, Body, Comments) in your response. I already have that.

                STRICT OUTPUT FORMAT:
                Your response must contain ONLY the implementation steps or the clarification request.  
                CRITICAL: If you do not follow the response requirement format exactly, the CI will fail. 

                CHOOSE ONE:

                PLAN:
                (Your plan must be highly precise. Include specific logical changes required. No vague descriptions.)

                QUESTION:
                (Ask only if exhaustive independent research failed. Briefly state what you investigated and exactly what information is blocking you.)
                [Your specific question here]

    route_create_pr:
        needs: [router, lease_linux]
        runs-on: opencode
        if: needs.router.outputs.route == 'create_pr'
        uses: ./.gitea/workflows/sub_create_pr.yml
        secrets: inherit

    route_initialize_pr:
        needs: [router, lease_linux]
        runs-on: opencode
        if: needs.router.outputs.route == 'initialize_pr'
        uses: ./.gitea/workflows/sub_opencode_comment.yml
        secrets: inherit
        with:
            issue_number: ${{ needs.router.outputs.issue_number }}
            prompt: |
                You are an expert software engineer. You are currently assigned to repository '${{ github.repository }}' to implement the changes requested in PR #${{ needs.router.outputs.issue_number }}.

                Your primary objective is to write the code required to fulfill the PR description, seamlessly integrate it into the existing codebase, and commit and push the final changes.

                PHASE 1: CONTEXT & DEEP RESEARCH (Use Gitea MCP & Tools)
                1. Fetch the details of PR #${{ needs.router.outputs.issue_number }} (title, body).
                2. TRACE THE ORIGIN: The PR body contains a reference/link to the original issue that triggered this PR. You MUST fetch that original issue and read its entire comment history to understand the exact feature request, prior discussions, and intended architectural approach.
                3. DEEP CODEBASE RECONNAISSANCE: Do not guess. Actively search the codebase, read relevant file contents, and trace dependencies. Understand how the modules you need to modify interact with the rest of the system.

                PHASE 2: IMPLEMENTATION STRATEGY & VALIDATION
                - EXHAUST ALL POSSIBILITIES: Before writing code, formulate an implementation plan. Mentally trace the execution path of your proposed changes. Check for potential side-effects, broken imports, or typing errors. 
                - AVOID LAZY QUESTIONS: Do not ask a question if the answer can be found by reading the code or investigating independently. You must try everything you can to resolve ambiguities by looking at existing codebase patterns.
                - MATCH EXISTING STYLE: Your implementation must strictly adhere to the existing naming conventions, architectural patterns, and coding standards found in the repository.

                PHASE 3: EXECUTION & COMMIT (CRITICAL)
                - Once your implementation is ready and validated, you MUST use your available tools to apply the changes directly to the workspace.
                - Stage your changes and create a clean, descriptive Git commit (adhering to conventional commits if the repository uses them).
                - Execute the git push to upload your changes to the remote branch associated with PR #${{ needs.router.outputs.issue_number }}.

                PHASE 4: OUTPUT
                - If you have successfully applied, committed, and pushed the changes, your response must be a brief summary of the completed work.
                - If, and ONLY if, you have exhausted all avenues of independent investigation and a critical product decision is completely blocking you from writing the code, you may ask a clarifying QUESTION.
                - Do NOT repeat the PR/Issue metadata (Title, Body, Comments) in your response. I already have that context.

                STRICT OUTPUT FORMAT:
                Your response must contain ONLY the summary of the successfully pushed implementation OR the single clarification request. 
                CRITICAL: Do not include introductory filler (e.g., \"I will now push the code\" or \"I have researched the issue\"). If you do not follow this exact format, the CI pipeline will fail.

    route_update_pr:
        concurrency:
            group: agent-pr-${{ needs.router.outputs.issue_number }}
            cancel-in-progress: false
        needs: [router, lease_linux]
        runs-on: opencode
        if: needs.router.outputs.route == 'update_pr'
        uses: ./.gitea/workflows/sub_opencode_comment.yml
        secrets: inherit
        with:
            issue_number: ${{ needs.router.outputs.issue_number }}
            prompt: |
                You are an expert software engineer assigned to repository '${{ github.repository }}' to update PR #${{ needs.router.outputs.issue_number }}.

                Your mission is to address new feedback provided in the PR timeline since your last activity.

                PHASE 0: TIMELINE AUDIT & DELTA IDENTIFICATION
                1. ACCESS DATA: 
                   - Use `gitea_issue_read` with method `get_comments` for general PR discussion.
                   - Use `gitea_pull_request_read` with method `list_pull_request_review_comments` to fetch all inline code feedback.
                2. FILTER: Identify ALL unresolved comments. Crucially, you must include comments that appeared BEFORE your last activity if they were not addressed by you ('agent') and remain unresolved. Do not filter out comments based on your last timestamp.
                3. EXTRACT: Collate this complete list of unresolved comments from both sources. These are your active requirements.
                4. MAP: For inline comments, note the `path`, `position`, and `diff_hunk` provided by the tool to pinpoint the code location.

                PHASE 1: CONTEXTUAL RESEARCH & CODE MAPPING
                - For each 'review_comment' or 'timeline_comment' identified:
                  - If the tool provides a `path` and `position` (inline), immediately fetch that file's content.
                  - If the feedback is general, locate the relevant logic via search/grep tools.
                  - Cross-reference the comment's `diff_hunk` with the current file state to ensure the context hasn't shifted.

                PHASE 2: IMPLEMENTATION
                - Implement the fixes or changes requested in the new feedback.
                - Ensure your code matches the repository's naming conventions and style.
                - Validation: Mentally simulate the fix. Do not push code that introduces obvious syntax or import errors.

                PHASE 3: EXECUTION & COMMIT
                - Apply the changes to the workspace.
                - Create a concise Git commit message summarizing the updates (e.g., "fix: addressed code review feedback regarding cache logic").
                - Push the changes to the remote branch associated with PR #${{ needs.router.outputs.issue_number }}.

                PHASE 4: OUTPUT
                - Provide ONLY a brief summary of the specific comments you addressed and the changes you made.
                - You MUST NOT output your thinking steps, reasoning, internal logic, conversational filler, or metadata.
                - If the feedback was ambiguous and you are blocked despite exhaustive research, ask a single clarifying QUESTION.

                STRICT OUTPUT FORMAT:
                [Summary of addressed feedback and pushed changes] OR [Clarification Question]
