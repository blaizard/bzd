name: CI

on:
    workflow_dispatch: # allows manual triggering
    schedule:
        - cron: "0 2 * * *" # runs daily at 02:00

jobs:

    # STAGE 1: Wake up the remote.
    wake_up_remote:
        runs-on: linux-local
        steps:
            - name: "WoL"
              run: |
                  /node_manager_client wol --wait 10.10.0.11:8980 --broadcast 10.10.0.255 --timeout 300 08:bf:b8:14:04:b6

    # STAGE 2: Build remotely.
    build_remote:
        needs: wake_up_remote
        runs-on: linux-remote
        steps:
            - uses: actions/checkout@v3
              with:
                  submodules: "true"

            - name: "Environment"
              run: |
                  cp tools/ci/gitea/.bazelrc.local .bazelrc.local
                  ./info.sh

            - name: "Build Tools"
              run: |
                  mkdir bin
                  ./tools/bazel build //tools/ci:bzd_node --remote_download_toplevel --//apps/artifacts/api:config.set=remotes=[https://datalocal.blaizard.com]
                  cp bazel-bin/tools/ci/bzd_node bin/bzd-node

            - name: "[normal] static analysis"
              run: |
                  ./bin/bzd-node timeit --path gitea/normal_static_analysis/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --output_groups=+metadata --config=dev --config=clang-tidy --config=mypy --config=clippy

            - name: "[normal] clang prod"
              run: |
                  ./bin/bzd-node timeit --path gitea/normal_clang_prod/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --output_groups=+metadata --config=clang --config=prod --config=cc

            - name: "[normal] gcc prod"
              run: |
                  ./bin/bzd-node timeit --path gitea/normal_gcc_prod/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --output_groups=+metadata --config=gcc --config=prod --config=cc

            - name: "[normal] esp32 prod"
              run: |
                  ./bin/bzd-node timeit --path gitea/normal_esp32_prod/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --output_groups=+metadata --config=esp32 --config=prod --config=cc
                  ./bin/bzd-node timeit --path gitea/normal_esp32_prod/command-1 \
                  ./tools/bazel test //rust/... --output_groups=+metadata --config=esp32 --config=prod

            - name: "[normal] esp32s3 prod"
              run: |
                  ./bin/bzd-node timeit --path gitea/normal_esp32s3_prod/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --output_groups=+metadata --config=esp32s3 --config=prod --config=cc
                  ./bin/bzd-node timeit --path gitea/normal_esp32s3_prod/command-1 \
                  ./tools/bazel test //rust/... --output_groups=+metadata --config=esp32s3 --config=prod

            - name: "[stress] dev (10 runs)"
              run: |
                  ./bin/bzd-node timeit --path gitea/stress_dev_10_runs/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --build_tests_only --test_tag_filters=stress,-cc-coverage --config=dev --runs_per_test=10 --local_test_jobs=1

            - name: "[stress] prod (10 runs)"
              run: |
                  ./bin/bzd-node timeit --path gitea/stress_prod_10_runs/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --build_tests_only --test_tag_filters=stress,-cc-coverage --config=prod --runs_per_test=10 --local_test_jobs=1

            - name: "[sanitizer] asan/lsan/ubsan"
              run: |
                  ./bin/bzd-node timeit --path gitea/sanitizer_asan_lsan_ubsan/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --config=clang --config=cc --config=sanitizer --config=asan --config=lsan --config=ubsan

            - name: "[sanitizer] tsan"
              run: |
                  ./bin/bzd-node timeit --path gitea/sanitizer_tsan/command-0 \
                  ./tools/bazel test --target_pattern_file=tools/ci/bazel_target_patterns.txt --config=clang --config=cc --config=sanitizer --config=tsan

            - name: "[coverage] nodejs"
              run: |
                  ./bin/bzd-node timeit --path gitea/coverage_nodejs/command-0 \
                  ./tools/bazel coverage ... --config=nodejs --config=local
                  ./bin/bzd-node publish-json --path coverage/nodejs $(pwd)/bazel-out/coverage/report.json

            - name: "[sanitizer] sanitizer"
              run: |
                  ./bin/bzd-node timeit --path gitea/sanitizer_sanitizer/command-0 \
                  ./tools/bazel run :sanitizer -- --check --all

            - name: "Deploy"
              uses: https://git.blaizard.com/blaise/deployment@main
              with:
                  ssh_private_key: ${{ secrets.BZD_SSH_PRIVATE_KEY }}
                  digitalocean_api_token: ${{ secrets.BZD_DIGITALOCEAN_API_TOKEN }}

            - name: "Info"
              if: always()
              run: |
                  ./info.sh

            - name: "Disable Remote Execution"
              if: always()
              run: |
                  ./tools/bazel run //deployment:remote_shutdown --config=local
