name: Nix Build

on:
    workflow_dispatch: # allows manual triggering

jobs:
    lease_linux:
        runs-on: node_manager_client
        steps:
            - name: "Lease Linux"
              uses: https://git.blaizard.com/blaise/deployment/ci/gitea/lease_linux@main
              with:
                  name: "nix_build"
                  ttl: "300"

    build_linux:
        needs: lease_linux
        runs-on: linux
        steps:
            - uses: https://git.blaizard.com/blaise/deployment/ci/gitea/setup@main
              with:
                  lease: "true"

            - name: "Set the SSH key"
              uses: https://git.blaizard.com/blaise/bzd/.gitea/actions/ssh_key@master
              with:
                  ssh_private_key: ${{ secrets.BZD_NIXOS_CACHE_SSH_KEY }}

            - name: "Build"
              run: |
                  bzd-lease ./deployment/nixos/provision.py --cache beast-nixos-cache build \
                        --node beast-buildbarn \
                        --node beast-game \
                        --node beast-llm \
                        --node beast-nixos-cache \
                        --node beast-runner \
                        --node beast-x86_64-linux \
                        --node laptop-xps13-9315
