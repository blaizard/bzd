name: checkout
description: "Checkout a repository to the runner's workspace"

inputs:
    submodules:
        description: "Whether to fetch submodules. Can be 'true' or 'false'."
        required: false
        default: "false"
    token:
        description: "The token to use for authentication. Can be a personal access token or the GITHUB_TOKEN secret."
        required: false
        default: "${{ github.token }}"

runs:
    using: composite
    steps:    
        # Special logic for PRs, they do behave differently:
        # - comments on PR are treated as comment on the base branch (no info on the PR branch)
        # - The ref is not populated correctly.
        - name: "Gather PR Metadata"
          id: metadata
          if: >-
              startsWith(github.event_name, 'pull_request') ||
              (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
          shell: bash
          env:
              PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
              TOKEN: ${{ inputs.token }}
          run: |
              if [ -z "$PR_NUMBER" ]; then
                echo "Error: PR_NUMBER is empty."
                exit 1
              fi

              PR_URL="${{ github.api_url }}/repos/${{ github.repository }}/pulls/${PR_NUMBER}"
              if command -v curl >/dev/null 2>&1; then
                  RESPONSE=$(curl -s -H "Authorization: token ${TOKEN}" "$PR_URL")
              else
                  RESPONSE=$(wget -qO- --header="Authorization: token ${TOKEN}" "$PR_URL")
              fi

              BRANCH=$(echo "$RESPONSE" | sed -E 's/.*"head":\{[^}]*"ref":"([^"]+)".*/\1/')
              SHA=$(echo "$RESPONSE" | sed -E 's/.*"head":\{[^}]*"sha":"([^"]+)".*/\1/')
              REF="refs/pull/${PR_NUMBER}/head"

              echo "pr url: ${PR_URL}"
              echo "response: ${RESPONSE}"
              echo "branch: ${BRANCH}"
              echo "ref: ${REF}"
              echo "sha: ${SHA}"

              echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
              echo "ref=${REF}" >> $GITHUB_OUTPUT
              echo "sha=${SHA}" >> $GITHUB_OUTPUT

        - name: "Checkout Repository"
          shell: bash
          env:
              SERVER_URL: ${{ github.server_url }}
              REPOSITORY: ${{ github.repository }}
              SHA: ${{ steps.metadata.outputs.sha || github.sha }}
              BRANCH: ${{ steps.metadata.outputs.branch || github.head_ref || github.ref_name || '' }}
              REF: ${{ steps.metadata.outputs.ref || github.ref || '' }}
              TOKEN: ${{ inputs.token }}
              DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          run: |
              set -euo pipefail

              # Clean up any existing git state
              rm -rf .git

              # Initialize git repository and set remote
              git config --global init.defaultBranch ${DEFAULT_BRANCH}
              git init .
              git remote add origin "${SERVER_URL}/${REPOSITORY}.git"

              # Check if TOKEN is provided and set up git authentication
              if [[ -n "${TOKEN:-}" ]]; then
                host="${SERVER_URL#*://}"
                git config --local url."https://x-access-token:${TOKEN}@${host}".insteadOf "https://${host}"
              else
                echo "No token provided, skipping authentication setup."
              fi

              fetch_target="${REF:-${BRANCH:-${SHA}}}"
              echo "Inputs:"
              echo "  branch=${BRANCH:-<none>}"
              echo "  ref=${REF:-<none>}"
              echo "  sha=${SHA:-<none>}"
              echo "  fetch_target=${fetch_target:-<none>}"

              git fetch --no-tags --depth=1 origin "${fetch_target}"

              # Fetch the specific commit or branch
              if [[ -n "${BRANCH}" ]]; then
                git fetch --no-tags --depth=1 origin "${BRANCH}:refs/remotes/origin/${BRANCH}"
                git checkout -B "${BRANCH}" "${SHA}"
                git branch --set-upstream-to="origin/${BRANCH}" "${BRANCH}"
                git fetch --unshallow || echo "Already complete or unshallow not supported; continuing..."
              else
                git checkout --detach "${SHA}"
              fi

              echo "Status:"
              echo "  HEAD=$(git rev-parse HEAD)"
              echo "  branch=$(git branch --show-current || true)"
              git --no-pager log -1 --decorate --oneline

        - name: "Checkout Submodules"
          if: inputs.submodules == 'true'
          shell: bash
          run: |
              set -euo pipefail

              git submodule sync --recursive
              git submodule update --init --recursive --depth=1

              echo "Submodule status:"
              git submodule status --recursive
