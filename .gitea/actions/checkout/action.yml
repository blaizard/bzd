name: checkout
description: "Checkout a repository to the runner's workspace"

inputs:
    submodules:
        description: "Whether to fetch submodules. Can be 'true' or 'false'."
        required: false
        default: "false"
    token:
        description: "The token to use for authentication. Can be a personal access token or the GITHUB_TOKEN secret."
        required: false
        default: ""

runs:
    using: composite
    steps:
        - name: "Checkout the repository"
          shell: bash
          env:
              SERVER_URL: ${{ github.server_url }}
              REPOSITORY: ${{ github.repository }}
              SHA: ${{ github.sha }}
              PR_BRANCH: ${{ github.event.pull_request.number && github.head_ref || '' }}
              REF: ${{ github.ref || '' }}
              TOKEN: ${{ inputs.token }}
              DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          run: |
              set -euo pipefail

              # Clean up any existing git state
              rm -rf .git

              # Initialize git repository and set remote
              git config --global init.defaultBranch ${DEFAULT_BRANCH}
              git init .
              git remote add origin "${SERVER_URL}/${REPOSITORY}.git"

              # Check if TOKEN is provided and set up git authentication
              if [[ -n "${TOKEN:-}" ]]; then
                host="${SERVER_URL#*://}"
                git config --local url."https://x-access-token:${TOKEN}@${host}".insteadOf "https://${host}"
              else
                echo "No token provided, skipping authentication setup."
              fi

              # Fetch the specific commit or branch
              if [[ -n "${PR_BRANCH}" ]]; then
                git fetch --no-tags --depth=1 origin "refs/heads/${PR_BRANCH}:refs/remotes/origin/${PR_BRANCH}"
                git checkout -B "${PR_BRANCH}" "origin/${PR_BRANCH}"
              elif [[ -n "${REF}" ]]; then
                git fetch --no-tags --depth=1 origin "${REF}:refs/temp/ci_ref"
                git checkout --detach "refs/temp/ci_ref"
              else
                git fetch --no-tags --depth=1 origin "${SHA}"
                git checkout --detach "${SHA}"
              fi

              echo "Inputs:"
              echo "  pr_branch=${PR_BRANCH:-<none>}"
              echo "  ref=${REF:-<none>}"
              echo "  sha=${SHA:-<none>}"
              echo "Status:"
              echo "  HEAD=$(git rev-parse HEAD)"
              echo "  branch=$(git branch --show-current || true)"
              git --no-pager log -1 --decorate --oneline

        - name: "Checkout submodules"
          if: inputs.submodules == 'true'
          shell: bash
          run: |
              set -euo pipefail

              git submodule sync --recursive
              git submodule update --init --recursive --depth=1

              echo "Submodule status:"
              git submodule status --recursive
