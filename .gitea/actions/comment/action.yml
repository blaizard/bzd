name: comment
description: "Comment on an issue or pull request"

inputs:
    api_url:
        description: "The Gitea API URL (e.g., https://gitea.com/api/v1)"
        required: true
    repository:
        description: "The repository to comment on (format: owner/repo)"
        required: true
    issue_number:
        description: "The issue or pull request number to comment on"
        required: true
    token:
        description: "Gitea personal access token with permissions to comment on issues"
        required: true
    body_file:
        description: "Path to a file containing the comment body (supports markdown)"
        required: true

runs:
    using: composite
    steps:
        - name: "Post comment to Gitea"
          shell: bash
          run: |
              set -euo pipefail
              if [ ! -s "${{ inputs.body_file }}" ]; then
                  echo "Error: Body file '${{ inputs.body_file }}' is missing or empty."
                  exit 1
              fi
              payload=$(jq -n --rawfile body "${{ inputs.body_file }}" '{body: $body}')
              curl -sS --fail-with-body -X POST \
                  -H "Authorization: token ${{ inputs.token }}" \
                  -H "Content-Type: application/json" \
                  -d "$payload" \
                  "${{ inputs.api_url }}/repos/${{ inputs.repository }}/issues/${{ inputs.issue_number }}/comments"
              echo "SUCCESS: comment created."
