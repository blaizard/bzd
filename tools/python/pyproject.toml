[tool.yapf]
based_on_style = "pep8"
use_tabs = true
continuation_align_style = "SPACE"
column_limit = 120
blank_line_before_nested_class_or_def = true
indent_dictionary_value = true

[tool.mypy]
python_version = "3.12"
exclude = [
    "rules_python_entry_point_*.py",
]

[tool.codespell]

[tool.ruff]
line-length = 120
indent-width = 1

[tool.ruff.format]
indent-style = "tab"
